<div class="login-page">

  <!-- BACKGROUND PATTERN -->
  <div class="emoji-bg">
  <span>🩺</span>
  <span>💊</span>
  <span>🚑</span>
  <span>🧬</span>
  <span>🏥</span>
  <span>💉</span>
  <span>💊</span>
  <span>🩺</span>
  <span>🚑</span>
  <span>🧬</span>
  <span>🏥</span>
  <span>💉</span>
</div>

  <div class="content">

    <!-- LOGO -->
    <img src="images/login_logo.png" alt="EHR System Logo" class="login-logo" />

    <!-- LOGIN CARD -->
    <div class="login-card">

      <h2>Login</h2>

      <form (ngSubmit)="login()">
        <input [(ngModel)]="username" name="username" placeholder="Username" required />
        <input [(ngModel)]="password" name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <p *ngIf="error" class="error">{{ error }}</p>

    </div>

    <!-- 🔥 MOVING TEXT -->
    <div class="ticker">
      <div class = "track">
        <span>• Welcome to EHR System - Your data is safe with us </span>
        <span>• Welcome to EHR System - Your data is safe with us </span>
        <span>• Welcome to EHR System - Your data is safe with us </span>
      </div>
    </div>

  </div>

</div>

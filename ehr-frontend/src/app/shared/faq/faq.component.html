<div class="faq-page" [ngClass]="role">

  <h2>❓ Frequently Asked Questions</h2>

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <input
      type="text"
      placeholder="Search questions..."
      [(ngModel)]="searchText" />
  </div>

  <!-- FAQ LIST -->
  <div class="faq-container">

    <div class="faq"
         *ngFor="let q of faqs | filter:searchText; let i = index"
         [class.open]="openIndex === i">

      <div class="question" (click)="toggle(i)">
        {{ q.q }}
      </div>

      <div class="answer">
        {{ q.a }}
      </div>

    </div>

  </div>

</div>
